<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>orb proof</title>
<style>html,body{margin:0;background:#000;color:#8f8;font-family:monospace}
#advisor-orb{position:relative;width:400px;height:400px}
#orb-canvas{position:absolute;inset:0;width:100%;height:100%}</style>
</head>
<body>
<div id="advisor-orb" class="idle">
  <canvas id="orb-canvas"></canvas>
</div>
<pre id="log">booting...</pre>
<script>document.write('<scr'+'ipt src="../js/orb.js?cb='+Date.now()+'"></scr'+'ipt>');</script>
<script>
// Composite the orb proof over solid black and return a data URL.
window.__proofOnBlack = function(frames, step, stateClass){
  var url = window.__orbProof(frames, step, stateClass);
  if(!url) return null;
  return new Promise(function(res){
    var img = new Image();
    img.onload = function(){
      var c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      var g = c.getContext('2d');
      g.fillStyle = '#000'; g.fillRect(0,0,c.width,c.height);
      g.drawImage(img,0,0);
      res(c.toDataURL('image/png'));
    };
    img.src = url;
  });
};
document.getElementById('log').textContent =
  'orbProof=' + (typeof window.__orbProof) + ' canvas=' +
  document.getElementById('orb-canvas').width + 'x' + document.getElementById('orb-canvas').height;
</script>
</body>
</html>
