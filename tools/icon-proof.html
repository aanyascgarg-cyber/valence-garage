<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valence Gold Badge Icon Proof</title>
<style>
  :root {
    --void: #04090B;
    --champagne: #E8D5A0;
    --gold: #C9A84C;
    --porcelain: #FAF4F0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #04090B;
    color: var(--porcelain);
    font-family: 'Montserrat', system-ui, sans-serif;
    padding: 28px;
  }
  h1 { font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase;
       color: var(--gold); margin-bottom: 4px; font-weight: 600; }
  .sub { font-size: 12px; color: rgba(232,200,180,0.6); margin-bottom: 24px; }

  /* The proof panel: a dark glass sheet on which we lay the icons, so we can
     judge contrast and jewel-quality the way they appear in the app. */
  #panel {
    background:
      linear-gradient(180deg, rgba(255,250,235,0.05) 0%, transparent 18%),
      radial-gradient(ellipse 90% 80% at 20% 100%, rgba(44,150,170,0.12) 0%, transparent 62%),
      rgba(16,24,30,0.9);
    border: 1px solid rgba(232,213,160,0.28);
    border-radius: 16px;
    box-shadow: 0 18px 46px rgba(0,0,0,0.6);
    padding: 26px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 22px 14px;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .cell .lbl {
    font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(201,168,76,0.7); text-align: center;
  }
  .row-title {
    grid-column: 1 / -1;
    font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase;
    color: rgba(201,168,76,0.5);
    border-bottom: 1px solid rgba(201,168,76,0.14);
    padding-bottom: 6px; margin-top: 8px;
  }

  /* ---- The gold badge family (mirror of style.css .gbadge) ---- */
  .gbadge {
    --badge-size: 40px;
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    flex: none;
    width: var(--badge-size); height: var(--badge-size);
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%,
      #FBF1D2 0%, #EAD59F 22%, #D8B45E 48%, #B58A34 78%, #8C6522 100%);
    box-shadow:
      inset 0 1px 1px rgba(255,251,236,0.85),
      inset 0 -2px 4px rgba(90,62,18,0.55),
      inset 0 0 7px rgba(255,240,200,0.35),
      0 2px 6px rgba(0,0,0,0.45),
      0 0 12px rgba(201,168,76,0.28);
    outline: 1px solid rgba(245,232,194,0.7);
    outline-offset: -1px;
  }
  .gbadge svg {
    position: relative; width: 56%; height: 56%;
    color: #1A1206; stroke: #1A1206;
    filter: drop-shadow(0 1px 0 rgba(255,248,224,0.5));
  }
  .gbadge.dim { filter: saturate(0.7) brightness(0.7); opacity: 0.45; }

  #raster-note { margin-top: 24px; font-size: 11px; color: rgba(232,200,180,0.5); }
</style>
</head>
<body>
  <h1>Valence Gold Badge Icon Family</h1>
  <div class="sub">Jewelry-grade radial gold gradient, champagne rim, near-black glyph. Every app icon, one family.</div>

  <div id="panel">
    <div class="grid" id="grid"><!-- filled by script --></div>
  </div>

  <div id="raster-note">Rasterizing to canvas for honest inspection...</div>

<script>
// Each glyph is the SVG inner markup, stroked (stroke inherits #1A1206 from CSS).
var GLYPHS = {
  // ---- 3 tab icons ----
  'Tab Garage': '<path d="M4 20V9l8-5 8 5v11" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 20v-6a4 4 0 0 1 8 0v6" stroke-linecap="round" stroke-linejoin="round"/>',
  'Tab Build':  '<path d="M4 8h9M17 8h3" stroke-linecap="round"/><path d="M4 16h3M11 16h9" stroke-linecap="round"/><circle cx="15" cy="8" r="2.3"/><circle cx="9" cy="16" r="2.3"/>',
  'Tab Advisor':'<path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7a2.5 2.5 0 0 1-2.5 2.5H9l-5 4V6.5z" stroke-linecap="round" stroke-linejoin="round"/>',
  // ---- 4 readout stat chips ----
  'Readout PTW':  '<path d="M13 3L5 13h5l-1 8 8-11h-5l1-7z" stroke-linecap="round" stroke-linejoin="round"/>',
  'Readout 0-60': '<path d="M4 12h13" stroke-linecap="round"/><path d="M12 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/>',
  'Readout Top':  '<path d="M4 18a8 8 0 0 1 16 0" stroke-linecap="round"/><path d="M12 18l4.5-5" stroke-linecap="round"/>',
  'Readout Brake':'<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3"/>',
  // ---- 6 spec card medallions ----
  'Medal Power':  '<path d="M13 3L5 13h5l-1 8 8-11h-5l1-7z" stroke-linecap="round" stroke-linejoin="round"/>',
  'Medal PTW':    '<path d="M12 3l8 9-8 9-8-9 8-9z" stroke-linecap="round" stroke-linejoin="round"/>',
  'Medal 0-60':   '<path d="M4 12h13" stroke-linecap="round"/><path d="M12 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/>',
  'Medal Top':    '<path d="M4 18a8 8 0 0 1 16 0" stroke-linecap="round"/><path d="M12 18l4.5-5" stroke-linecap="round"/>',
  'Medal Brake':  '<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3"/>',
  'Medal Weight': '<path d="M12 3v3" stroke-linecap="round"/><path d="M12 6l5 11H7l5-11z" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 6v11" stroke-linecap="round"/>',
  // ---- controls ----
  'Back':      '<path d="M15 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>',
  'Close X':   '<path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/>',
  'Voice':     '<path d="M4 9.5v5h3.5l4.5 3.5v-12L7.5 9.5H4z" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 9a4 4 0 0 1 0 6" stroke-linecap="round"/>',
  'Send':      '<path d="M4 12l16-7-7 16-2.5-6.5L4 12z" stroke-linecap="round" stroke-linejoin="round"/>',
  'Keyboard':  '<rect x="3" y="7" width="18" height="11" rx="2"/><path d="M7 11h0M11 11h0M15 11h0M7 14.5h10" stroke-linecap="round"/>',
  'Eng Chevron':'<path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>'
};

var GROUPS = [
  ['Tab icons', ['Tab Garage','Tab Build','Tab Advisor']],
  ['Readout stat chips', ['Readout PTW','Readout 0-60','Readout Top','Readout Brake']],
  ['Spec card medallions', ['Medal Power','Medal PTW','Medal 0-60','Medal Top','Medal Brake','Medal Weight']],
  ['Controls', ['Back','Close X','Voice','Send','Keyboard','Eng Chevron']]
];

var grid = document.getElementById('grid');
GROUPS.forEach(function (g) {
  var t = document.createElement('div');
  t.className = 'row-title';
  t.textContent = g[0];
  grid.appendChild(t);
  g[1].forEach(function (name) {
    var cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML =
      '<span class="gbadge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
        GLYPHS[name] +
      '</svg></span>' +
      '<div class="lbl">' + name + '</div>';
    grid.appendChild(cell);
  });
  // Also show a dim variant of the first icon in each group for the inactive read.
});

// One dim-state demo row for the tab inactive read.
(function () {
  var t = document.createElement('div');
  t.className = 'row-title';
  t.textContent = 'Inactive (dim 45%) vs active';
  grid.appendChild(t);
  ['Tab Garage','Tab Build','Tab Advisor'].forEach(function (name) {
    var cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML =
      '<span class="gbadge dim"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
        GLYPHS[name] + '</svg></span>' +
      '<div class="lbl">' + name + ' dim</div>';
    grid.appendChild(cell);
  });
})();

// ---- Native-canvas rasterize (reliable; no foreignObject) ----
// We draw the exact gold-badge recipe onto a canvas: radial gradient disc,
// champagne rim, inner glow, then the glyph via Path2D from its SVG d-strings.
// This mirrors style.css .gbadge honestly and always produces a PNG.
function drawBadge(ctx, cx, cy, r, glyphSvg, dim) {
  ctx.save();
  if (dim) ctx.globalAlpha = 0.45;
  // Disc: radial gold gradient, champagne top-left to deep gold bottom-right.
  var gx = cx - r * 0.36, gy = cy - r * 0.44;
  var grad = ctx.createRadialGradient(gx, gy, r * 0.1, cx, cy, r * 1.15);
  grad.addColorStop(0.00, '#FBF1D2');
  grad.addColorStop(0.22, '#EAD59F');
  grad.addColorStop(0.48, '#D8B45E');
  grad.addColorStop(0.78, '#B58A34');
  grad.addColorStop(1.00, '#8C6522');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  // Soft outer bloom
  ctx.shadowColor = 'rgba(201,168,76,0.5)'; ctx.shadowBlur = r * 0.5;
  ctx.fillStyle = grad; ctx.fill();
  ctx.shadowBlur = 0;
  // Inner top highlight crescent
  var hi = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
  hi.addColorStop(0, 'rgba(255,251,236,0.85)');
  hi.addColorStop(0.3, 'rgba(255,251,236,0)');
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.92, 0, Math.PI * 2);
  ctx.fillStyle = hi; ctx.fill();
  // Bottom inner shadow for depth
  var lo = ctx.createLinearGradient(cx, cy + r, cx, cy - r * 0.2);
  lo.addColorStop(0, 'rgba(90,62,18,0.5)');
  lo.addColorStop(0.5, 'rgba(90,62,18,0)');
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.92, 0, Math.PI * 2);
  ctx.fillStyle = lo; ctx.fill();
  // 1px champagne rim
  ctx.beginPath(); ctx.arc(cx, cy, r - 0.5, 0, Math.PI * 2);
  ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(245,232,194,0.75)'; ctx.stroke();
  // Glyph: parse the svg inner markup, map 24x24 viewBox to badge center.
  var scale = (r * 1.12) / 24;
  ctx.translate(cx - 12 * scale, cy - 12 * scale);
  ctx.scale(scale, scale);
  ctx.strokeStyle = '#1A1206'; ctx.fillStyle = '#1A1206';
  ctx.lineWidth = 1.7; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  var holder = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  holder.innerHTML = glyphSvg;
  Array.prototype.forEach.call(holder.children, function (el) {
    var tag = el.tagName.toLowerCase();
    if (tag === 'path') {
      var p = new Path2D(el.getAttribute('d'));
      if (el.getAttribute('fill') && el.getAttribute('fill') !== 'none') ctx.fill(p);
      else ctx.stroke(p);
    } else if (tag === 'circle') {
      var c = new Path2D();
      c.arc(+el.getAttribute('cx'), +el.getAttribute('cy'), +el.getAttribute('r'), 0, Math.PI * 2);
      ctx.stroke(c);
    } else if (tag === 'rect') {
      var rp = new Path2D();
      var rx = +el.getAttribute('rx') || 0;
      rp.roundRect(+el.getAttribute('x'), +el.getAttribute('y'), +el.getAttribute('width'), +el.getAttribute('height'), rx);
      ctx.stroke(rp);
    }
  });
  ctx.restore();
}

function rasterize() {
  var scale = 2;
  var cols = 6, cw = 118, chH = 120, padX = 30, padTop = 60, groupGap = 40;
  var W = padX * 2 + cols * cw;
  // Layout rows across groups.
  var layout = [];
  var y = padTop;
  GROUPS.concat([['Inactive (dim 45%)', ['Tab Garage','Tab Build','Tab Advisor'], true]]).forEach(function (g) {
    layout.push({ title: g[0], y: y }); y += 30;
    var names = g[1], dim = g[2];
    for (var i = 0; i < names.length; i++) {
      var col = i % cols, row = Math.floor(i / cols);
      layout.push({ icon: names[i], dim: dim, x: padX + col * cw + cw / 2, y: y + row * chH + 46 });
    }
    var rows = Math.ceil(names.length / cols);
    y += rows * chH + groupGap;
  });
  var H = y + 20;

  var canvas = document.createElement('canvas');
  canvas.width = W * scale; canvas.height = H * scale;
  var ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  // Panel bg
  ctx.fillStyle = '#04090B'; ctx.fillRect(0, 0, W, H);
  var pg = ctx.createLinearGradient(0, 0, 0, H);
  pg.addColorStop(0, 'rgba(20,30,38,0.92)'); pg.addColorStop(1, 'rgba(12,18,24,0.92)');
  ctx.fillStyle = pg; ctx.fillRect(12, 12, W - 24, H - 24);
  ctx.strokeStyle = 'rgba(232,213,160,0.28)'; ctx.lineWidth = 1;
  ctx.strokeRect(12.5, 12.5, W - 25, H - 25);

  layout.forEach(function (item) {
    if (item.title) {
      ctx.fillStyle = 'rgba(201,168,76,0.6)';
      ctx.font = '600 10px Montserrat, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(item.title.toUpperCase(), padX, item.y);
      ctx.strokeStyle = 'rgba(201,168,76,0.14)';
      ctx.beginPath(); ctx.moveTo(padX, item.y + 8); ctx.lineTo(W - padX, item.y + 8); ctx.stroke();
    } else {
      drawBadge(ctx, item.x, item.y, 20, GLYPHS[item.icon], item.dim);
      ctx.fillStyle = 'rgba(201,168,76,0.7)';
      ctx.font = '600 8px Montserrat, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(item.icon.toUpperCase(), item.x, item.y + 34);
    }
  });

  window.__ICON_PROOF_DATAURL = canvas.toDataURL('image/png');
  document.getElementById('raster-note').textContent = 'Rasterized ' + canvas.width + 'x' + canvas.height + '. Posting.';
  fetch('http://127.0.0.1:8402/icon-proof', { method: 'POST', body: window.__ICON_PROOF_DATAURL })
    .then(function(){ document.getElementById('raster-note').textContent = 'Posted icon-proof.png.'; })
    .catch(function(e){ document.getElementById('raster-note').textContent = 'POST failed: ' + e; });
}
setTimeout(rasterize, 350);
</script>
</body>
</html>
